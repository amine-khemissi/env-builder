name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -o bin/eb-linux-amd64 .

      - name: Build linux/arm64
        run: GOOS=linux GOARCH=arm64 go build -o bin/eb-linux-arm64 .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/eb-linux-amd64
            bin/eb-linux-arm64
            managers.yaml
