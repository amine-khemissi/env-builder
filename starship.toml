# Starship config — bash-git-prompt style git indicators

format = "$directory$git_branch$git_status${custom.git_clean}$line_break$character"

[directory]
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = ""
format = "($branch)"
style = "bold cyan"

[git_status]
format = '([\[](130)[$ahead_behind$conflicted](bold yellow)[$staged](bold red)[$modified](bold blue)[$untracked](28)[$deleted](bold red)[\]](130))'
conflicted = "|✖"
ahead = "↑·${count}"
behind = "↓·${count}"
diverged = "↑·${ahead_count}↓·${behind_count}"
staged = "|●${count}"
modified = "|✚${count}"
untracked = "|…${count}"
deleted = "|✗${count}"
renamed = ""

[git_commit]
disabled = true

[custom.git_clean]
command = 'echo ✔'
when = '[ -z "$(git status --porcelain 2>/dev/null)" ] && { ahead=$(git rev-list @{u}..HEAD 2>/dev/null | wc -l); [ -z "$ahead" ] || [ "$ahead" = "0" ]; }'
format = '[\[](130)[$output](bold green)[\]](130)'
style = "bold green"
shell = ["bash", "--norc"]

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
